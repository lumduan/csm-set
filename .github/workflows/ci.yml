name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src/
      - run: uv run pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t csm-set:ci .

  results-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required results files exist
        run: |
          for f in \
            results/notebooks/01_data_exploration.html \
            results/notebooks/02_signal_research.html \
            results/notebooks/03_backtest_analysis.html \
            results/notebooks/04_portfolio_optimization.html \
            results/backtest/summary.json \
            results/backtest/equity_curve.json \
            results/backtest/annual_returns.json \
            results/signals/latest_ranking.json; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All required results files present."